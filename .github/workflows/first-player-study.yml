name: First-player advantage study

on:
  push:
    paths:
      - ".github/workflows/first-player-study.yml"
      - "tools/benchmark.js"
      - "public/engine.js"
      - "public/ai.js"
      - "public/ai-config.js"
      - "public/ai-weights.js"
  pull_request:
    paths:
      - ".github/workflows/first-player-study.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: benchmark batch ${{ matrix.batch }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - { batch: 1, seed: 20260714 }
          - { batch: 2, seed: 20260764 }
          - { batch: 3, seed: 20260814 }
          - { batch: 4, seed: 20260864 }
          - { batch: 5, seed: 20260914 }
          - { batch: 6, seed: 20260964 }
          - { batch: 7, seed: 20261014 }
          - { batch: 8, seed: 20261064 }
          - { batch: 9, seed: 20261114 }
          - { batch: 10, seed: 20261164 }
          - { batch: 11, seed: 20261214 }
          - { batch: 12, seed: 20261264 }
          - { batch: 13, seed: 20261314 }
          - { batch: 14, seed: 20261364 }
          - { batch: 15, seed: 20261414 }
          - { batch: 16, seed: 20261464 }
          - { batch: 17, seed: 20261514 }
          - { batch: 18, seed: 20261564 }
          - { batch: 19, seed: 20261614 }
          - { batch: 20, seed: 20261664 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run 50 paired-seat games
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/first-player-study
          node tools/benchmark.js \
            --games 50 \
            --seed "${{ matrix.seed }}" \
            --first hard \
            --second hard \
            --first-profile bao \
            --second-profile bao \
            --first-search phase2 \
            --second-search phase2 \
            --time-limit 0 \
            --max-depth 2 \
            --max-turns 300 \
            --opening-plies 0 \
            --opening-phase any \
            --output "artifacts/first-player-study/batch-${{ matrix.batch }}-seed-${{ matrix.seed }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: first-player-study-batch-${{ matrix.batch }}
          path: artifacts/first-player-study/*.json
          if-no-files-found: error

  aggregate:
    name: aggregate 1,000 games
    needs: benchmark
    if: ${{ always() && needs.benchmark.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/download-artifact@v4
        with:
          pattern: first-player-study-batch-*
          path: artifacts/first-player-study
          merge-multiple: true
      - name: Aggregate results
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const dir = 'artifacts/first-player-study';
          const files = fs.readdirSync(dir)
            .filter((name) => name.endsWith('.json') && name !== 'summary.json')
            .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
          if (files.length !== 20) {
            throw new Error(`Expected 20 batch reports, found ${files.length}`);
          }
          const reports = files.map((name) => JSON.parse(fs.readFileSync(path.join(dir, name), 'utf8')));
          const totals = reports.reduce((acc, report) => {
            acc.games += report.games;
            acc.southWins += report.southWins;
            acc.northWins += report.northWins;
            acc.draws += report.draws;
            acc.totalTurns += report.averageTurns * report.games;
            return acc;
          }, { games: 0, southWins: 0, northWins: 0, draws: 0, totalTurns: 0 });
          if (totals.games !== 1000) {
            throw new Error(`Expected 1,000 games, found ${totals.games}`);
          }
          const decisive = totals.southWins + totals.northWins;
          const p = decisive ? totals.southWins / decisive : 0;
          const z = 1.959963984540054;
          const denom = decisive ? 1 + z * z / decisive : 1;
          const center = decisive ? (p + z * z / (2 * decisive)) / denom : 0;
          const margin = decisive
            ? z * Math.sqrt((p * (1 - p) + z * z / (4 * decisive)) / decisive) / denom
            : 0;
          const summary = {
            generatedAt: new Date().toISOString(),
            methodology: {
              batches: 20,
              gamesPerBatch: 50,
              totalGames: 1000,
              seeds: reports.map((report) => report.config.seed),
              first: 'hard',
              second: 'hard',
              profile: 'bao',
              search: 'phase2',
              timeLimitMs: 0,
              maxDepth: 2,
              maxTurns: 300,
              openingPlies: 0,
              pairedSeatSwap: true
            },
            totals: {
              ...totals,
              averageTurns: totals.totalTurns / totals.games,
              southWinRateAllGames: totals.southWins / totals.games,
              southWinRateDecisive: p,
              southWinRateWilson95: [center - margin, center + margin]
            },
            runs: reports.map((report, index) => ({
              batch: index + 1,
              seed: report.config.seed,
              games: report.games,
              southWins: report.southWins,
              northWins: report.northWins,
              draws: report.draws,
              averageTurns: report.averageTurns
            }))
          };
          fs.writeFileSync(path.join(dir, 'summary.json'), `${JSON.stringify(summary, null, 2)}\n`);
          console.log(JSON.stringify(summary, null, 2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: first-player-study
          path: artifacts/first-player-study/
          if-no-files-found: error
