name: Phase Transition Research CI

on:
  pull_request:
    paths:
      - "doc/PHASE_TRANSITION_RESEARCH_PLAN.md"
      - "doc/phase-transition/**"
      - "schemas/phase-transition-observation.schema.json"
      - "tools/experiments/generate-phase-transition-fixture.js"
      - "tools/experiments/run-phase-transition-research.js"
      - "tools/experiments/verify-phase-transition-artifacts.js"
      - "tools/experiments/analyze-phase-transition-pilot.py"
      - "tools/experiments/lib/phase-transition-features.js"
      - "test/phase-transition-*.test.js"
      - "notebooks/phase-transition/**"
      - ".github/workflows/phase-transition-research-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run phase-transition tests
        run: |
          node test/phase-transition-features.test.js
          node test/phase-transition-fixture.test.js
          node test/phase-transition-runner.test.js
      - name: Generate fixture artifacts
        run: node tools/experiments/generate-phase-transition-fixture.js
      - name: Verify fixture artifacts
        run: node tools/experiments/verify-phase-transition-artifacts.js
      - name: Run shortened diversity smoke research
        run: |
          node tools/experiments/run-phase-transition-research.js \
            --games 4 \
            --seed 20260721 \
            --max-ply 10 \
            --opening-plies 4 \
            --baseline-games 1 \
            --level easy \
            --max-depth 1 \
            --output artifacts/phase-transition/ci-diversity-smoke
          node tools/experiments/verify-phase-transition-artifacts.js \
            --input artifacts/phase-transition/ci-diversity-smoke
          node -e 'const m=require("./artifacts/phase-transition/ci-diversity-smoke/manifest.json"); if(!m.diversity.passesPilotGate) throw new Error(JSON.stringify(m.diversity))'
      - name: Validate schema, notebooks, and analysis syntax
        run: |
          node -e 'JSON.parse(require("node:fs").readFileSync("schemas/phase-transition-observation.schema.json", "utf8"))'
          node -e 'JSON.parse(require("node:fs").readFileSync("notebooks/phase-transition/01-data-audit.ipynb", "utf8"))'
          node -e 'JSON.parse(require("node:fs").readFileSync("notebooks/phase-transition/02-transition-candidate-analysis.ipynb", "utf8"))'
          python -m py_compile tools/experiments/analyze-phase-transition-pilot.py
      - name: Upload phase-transition artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase-transition-ci-artifacts
          path: |
            artifacts/phase-transition/fixture/
            artifacts/phase-transition/ci-diversity-smoke/
          if-no-files-found: error
