name: First-player experiment suite

on:
  push:
    paths:
      - ".github/workflows/first-player-experiment-suite.yml"
      - "tools/first-player-experiment-suite.js"
      - "tools/first-player-symmetry-audit.js"
      - "public/engine.js"
      - "public/ai.js"
      - "public/ai-weights.js"
  pull_request:
    paths:
      - ".github/workflows/first-player-experiment-suite.yml"
      - "tools/first-player-experiment-suite.js"
      - "tools/first-player-symmetry-audit.js"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  games:
    name: ${{ matrix.condition }} / batch ${{ matrix.batch }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        condition:
          - depth-1
          - depth-2
          - depth-3
          - depth-4
          - policy-uniform
          - policy-top3
          - policy-softmax
          - eval-legacy
          - eval-bao
          - eval-bao-v2
          - eval-mcts
        batch: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Resolve condition
        id: condition
        shell: bash
        run: |
          set -euo pipefail
          depth=2
          policy=uniform
          profile=bao
          search=phase2
          case "${{ matrix.condition }}" in
            depth-1) depth=1 ;;
            depth-2) depth=2 ;;
            depth-3) depth=3 ;;
            depth-4) depth=4 ;;
            policy-uniform) policy=uniform ;;
            policy-top3) policy=top3 ;;
            policy-softmax) policy=softmax ;;
            eval-legacy) profile=legacy ;;
            eval-bao) profile=bao ;;
            eval-bao-v2) profile=bao-v2 ;;
            eval-mcts) profile=bao; search=mcts ;;
            *) echo "Unknown condition" >&2; exit 1 ;;
          esac
          echo "depth=$depth" >> "$GITHUB_OUTPUT"
          echo "policy=$policy" >> "$GITHUB_OUTPUT"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "search=$search" >> "$GITHUB_OUTPUT"
      - name: Run 50 games
        shell: bash
        run: |
          set -euo pipefail
          seed=$((20260714 + ${{ matrix.batch }} * 1009 + ${{ strategy.job-index }} * 7919))
          mkdir -p artifacts/first-player-suite
          node tools/first-player-experiment-suite.js \
            --games 50 \
            --seed "$seed" \
            --random-plies 8 \
            --max-depth "${{ steps.condition.outputs.depth }}" \
            --opening-policy "${{ steps.condition.outputs.policy }}" \
            --evaluation-profile "${{ steps.condition.outputs.profile }}" \
            --search-profile "${{ steps.condition.outputs.search }}" \
            --mcts-iterations 400 \
            --output "artifacts/first-player-suite/${{ matrix.condition }}-batch-${{ matrix.batch }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: first-player-suite-${{ matrix.condition }}-${{ matrix.batch }}
          path: artifacts/first-player-suite/*.json
          if-no-files-found: error

  symmetry:
    name: South-North symmetry audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node tools/first-player-symmetry-audit.js artifacts/first-player-suite/symmetry.json
      - uses: actions/upload-artifact@v4
        with:
          name: first-player-suite-symmetry
          path: artifacts/first-player-suite/symmetry.json
          if-no-files-found: error

  aggregate:
    name: aggregate experiments 1-5
    needs: [games, symmetry]
    if: ${{ always() && needs.games.result == 'success' && needs.symmetry.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/download-artifact@v4
        with:
          pattern: first-player-suite-*
          path: artifacts/first-player-suite
          merge-multiple: true
      - name: Aggregate condition results
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const dir = 'artifacts/first-player-suite';
          const files = fs.readdirSync(dir).filter((name) => name.endsWith('.json') && name !== 'symmetry.json');
          if (files.length !== 44) throw new Error(`Expected 44 game reports, found ${files.length}`);
          const reports = files.map((name) => JSON.parse(fs.readFileSync(path.join(dir, name), 'utf8')));
          const groups = new Map();
          for (const report of reports) {
            const c = report.config;
            const key = `${c.maxDepth}|${c.openingPolicy}|${c.evaluationProfile}|${c.searchProfile}`;
            if (!groups.has(key)) groups.set(key, { config: c, games: 0, southWins: 0, northWins: 0, draws: 0, turns: 0, firstMoves: {} });
            const group = groups.get(key);
            group.games += report.totals.games;
            group.southWins += report.totals.southWins;
            group.northWins += report.totals.northWins;
            group.draws += report.totals.draws;
            group.turns += report.totals.averageTurns * report.totals.games;
            for (const item of report.firstMoves) {
              group.firstMoves[item.move] ||= { games: 0, southWins: 0, northWins: 0, draws: 0 };
              for (const field of ['games', 'southWins', 'northWins', 'draws']) group.firstMoves[item.move][field] += item[field];
            }
          }
          const conditions = [...groups.values()].map((group) => ({
            config: {
              maxDepth: group.config.maxDepth,
              openingPolicy: group.config.openingPolicy,
              evaluationProfile: group.config.evaluationProfile,
              searchProfile: group.config.searchProfile,
              randomPlies: group.config.randomPlies,
            },
            games: group.games,
            southWins: group.southWins,
            northWins: group.northWins,
            draws: group.draws,
            southWinRate: group.southWins / Math.max(1, group.southWins + group.northWins),
            averageTurns: group.turns / group.games,
            firstMoves: Object.entries(group.firstMoves).map(([move, value]) => ({ move, ...value, southWinRate: value.southWins / Math.max(1, value.southWins + value.northWins) })).sort((a, b) => b.games - a.games),
          }));
          const symmetry = JSON.parse(fs.readFileSync(path.join(dir, 'symmetry.json'), 'utf8'));
          const summary = { generatedAt: new Date().toISOString(), totalGames: conditions.reduce((n, c) => n + c.games, 0), conditions, symmetry: symmetry.summary };
          fs.writeFileSync(path.join(dir, 'summary.json'), `${JSON.stringify(summary, null, 2)}\n`);
          console.log(JSON.stringify(summary, null, 2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: first-player-experiment-suite
          path: artifacts/first-player-suite/
          if-no-files-found: error
